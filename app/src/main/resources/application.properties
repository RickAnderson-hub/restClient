# H2 file-based database — stored in the user's home directory so data survives restarts
spring.datasource.url=jdbc:h2:file:${user.home}/.restclient/data;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate
# 'update' adds new columns/tables without dropping existing data
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 web console — disable in production, enable only for local debugging
spring.h2.console.enabled=false

# Logging
logging.level.com.restclient=INFO
logging.level.org.springframework.data=WARN
